{% extends 'store/layouts/base.html' %}

<!-- Title -->
{% block titleBlock %}
<title>Login | Page</title>
{% endblock titleBlock %}

<!-- Style Block -->
{% block styleBlock %}
<style>
    input:invalid {
        border: 2px solid red;
    }
</style>
{% endblock styleBlock %}


<!-- Content -->
{% block contentBlock %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="">
                <div class="card mt-3 shadow">
                    <div class="card-body">
                        <form action="" method="POST">
                            {% csrf_token %}

                            <div class="text-center">
                                <h4> login Form </h4>
                            </div>
                            <hr>
                            <!-- Username -->
                            <div class="form-group">
                                <label for="id_username">Username :</label>
                               <input type="text">
                            </div>

                            

                            <!-- Password -->
                            <div class="form-group">
                                <label for="id_username">Password :</label>
                                <input type="password">
                            </div>

                           
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-success float-end shadow px-4">
                                Login
                            </button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock contentBlock %}
