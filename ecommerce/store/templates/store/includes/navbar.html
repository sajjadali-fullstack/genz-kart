<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
    {% block 'styleBlock' %}
    <style>
        /* Jo link active hai uska rang badalne ke liye */
        .nav-link.active {
            font-weight: bold;
            color: #000 !important;
            /* Dark color */
            border-bottom: 2px solid black;
            /* Niche ek line */
        }
    </style>
    {% endblock 'styleBlock' %}
</head>

<body>
    <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-2">
        <div class="container">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <!-- Home -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                            aria-current="page" href="{% url 'home' %}">Home</a>
                    </li>

                    <!-- Collections -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'collections' %}active{% endif %}"
                            href="{% url 'collections' %}">Collections</a>
                    </li>

                    <!-- Cart -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'cart' %}active{% endif %}" aria-current="page" href="{% url 'view_cart' %}">Cart</a>
                           
                    </li>

                    <!-- Pricing -->
                    <li class="nav-item">
                        <a class="nav-link"
                            href="#">Pricing</a>
                    </li>

                    {% if request.user.is_authenticated %}
                    <!-- Logout -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'logout' %}active{% endif %}"
                            href="{% url 'logout' %}">Logout</a>
                    </li>
                    {% else %}

                    <!-- Login -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}"
                            href="{% url 'login' %}">Login</a>
                    </li>

                    <!-- Register -->
                    <li class="nav-item">
                        <a class="nav-link  {% if request.resolver_match.url_name == 'register' %}active{% endif %}"
                            href="{% url 'register' %}">Register</a>
                    </li>
                    {% endif %}

                    <!-- Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            {{ request.user }}
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                        </ul>
                    </li>

                    
                </ul>
            </div>
        </div>
    </nav>
</body>

</html>
